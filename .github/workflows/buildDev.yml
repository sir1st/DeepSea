name: BuildDev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - id: set-version
      run: |
        version=$(python -c 'import json; f=open("./settings.json"); print(json.loads(f.read())["releaseVersion"])')
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: |
        if [ -f ../requirements.txt ]; then pip3 install -r ../requirements.txt; fi

    - name: Validate release assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python ./start.py --dry-run

    - name: Create DeepSea Packages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python ./start.py

    - name: Create DevRelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        shopt -s nullglob
        assets=(./*.zip)
        if [ ${#assets[@]} -eq 0 ]; then
          echo "No release assets were built" >&2
          exit 1
        fi
        gh release create "v${{ steps.set-version.outputs.version }}-dev" "${assets[@]}" \
          --draft \
          --title "DevRelease v${{ steps.set-version.outputs.version }}" \
          --notes "DevRelease v${{ steps.set-version.outputs.version }}"
